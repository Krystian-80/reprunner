<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RepRunner</title>
<style>
:root {
  --bg: #0c0d08;
  --surface: #141510;
  --surface2: #1c1e15;
  --surface3: #23261a;
  --border: #2e3122;
  --border2: #3d4230;
  --accent: #8a9a4a;
  --accent2: #b8cc5a;
  --accent3: #d4e870;
  --dim: #5a6335;
  --red: #c0392b;
  --green: #4a7c3f;
  --green2: #6ab04c;
  --amber: #b8860b;
  --amber2: #d4a017;
  --text: #d8dcc0;
  --text2: #9aa080;
  --text3: #5a6040;
  --radius: 4px;
  --radius2: 8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:transform .25s cubic-bezier(.4,0,.2,1),opacity .25s;}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none;}
.screen.slide-left{transform:translateX(-100%);opacity:0;pointer-events:none;}

/* scanline overlay */
.screen::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:999;}

.hdr{padding:48px 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid var(--border);}
.hdr-back{width:36px;height:36px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border2);color:var(--accent2);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;}
.hdr-title{font-size:15px;font-weight:700;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;}
.hdr-sub{font-size:11px;color:var(--text3);letter-spacing:1px;margin-top:2px;}

/* LIST */
#screen-list{background:var(--bg);}
.list-top{padding:48px 16px 10px;flex-shrink:0;}
.brand{font-size:11px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.list-top h1{font-size:32px;font-weight:700;color:var(--accent2);letter-spacing:4px;text-transform:uppercase;line-height:1;}
.blade-sub{font-size:10px;color:var(--text3);letter-spacing:2px;margin-top:4px;}

.prog-wrap{padding:10px 16px 0;flex-shrink:0;}
.prog-bar{height:2px;background:var(--surface3);position:relative;}
.prog-fill{height:100%;background:var(--accent);transition:width .4s;}
.prog-label{font-size:10px;color:var(--text3);letter-spacing:1px;margin-top:4px;}

.filters{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 12px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border);font-size:11px;color:var(--text3);cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-family:inherit;}
.chip.on{background:var(--surface3);border-color:var(--accent);color:var(--accent2);}

.lead-list{flex:1;overflow-y:auto;padding:4px 16px 90px;scrollbar-width:none;}
.lead-list::-webkit-scrollbar{display:none;}

.lcard{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border2);border-radius:var(--radius);padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .1s;}
.lcard:active{background:var(--surface2);border-left-color:var(--accent);}
.lcard.has-note{border-left-color:var(--accent);}
.ava{width:40px;height:40px;border-radius:var(--radius);background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;color:var(--accent2);border:1px solid var(--border2);letter-spacing:0;}
.linfo{flex:1;min-width:0;}
.lname{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.5px;}
.lmeta{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px;}
.badge{flex-shrink:0;padding:3px 8px;border-radius:var(--radius);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:inherit;}
.b-note{background:rgba(74,124,63,.2);color:var(--green2);border:1px solid var(--green);}
.b-open{background:rgba(138,154,74,.1);color:var(--dim);border:1px solid var(--border2);}
.b-offer{background:rgba(184,134,11,.15);color:var(--amber2);border:1px solid var(--amber);}
.b-warn{background:rgba(192,57,43,.15);color:#e74c3c;border:1px solid var(--red);}

.fab{position:fixed;bottom:20px;right:16px;width:48px;height:48px;border-radius:var(--radius);background:var(--surface3);border:1px solid var(--accent);color:var(--accent2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;}

/* DETAIL */
#screen-detail{background:var(--bg);}
.det-scroll{flex:1;overflow-y:auto;scrollbar-width:none;}
.det-scroll::-webkit-scrollbar{display:none;}
.det-hero{padding:16px 16px 12px;border-bottom:1px solid var(--border);}
.det-ava{width:52px;height:52px;border-radius:var(--radius);background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--accent2);border:1px solid var(--border2);margin-bottom:10px;}
.det-name{font-size:22px;font-weight:700;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;}
.det-firma{font-size:12px;color:var(--text3);margin-top:3px;letter-spacing:1px;}
.det-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.tag{padding:3px 8px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border);font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-family:inherit;}

.info-block{margin:12px 16px;border:1px solid var(--border);border-radius:var(--radius);}
.irow{padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.irow:last-child{border-bottom:none;}
.ilabel{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.ival{font-size:12px;font-weight:700;color:var(--text);text-align:right;max-width:58%;word-break:break-all;}
.ival.em{color:var(--accent);font-size:11px;}

.note-block{margin:0 16px 12px;border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.note-lbl{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.note-val{font-size:13px;line-height:1.6;color:var(--text);}
.note-empty{color:var(--text3);font-style:italic;font-size:12px;}

.actions{padding:12px 16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;}
.btn{border:none;border-radius:var(--radius);padding:14px 10px;font-size:12px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .1s;font-family:inherit;letter-spacing:1px;text-transform:uppercase;}
.btn:active{transform:scale(.97);}
.btn-icon{font-size:20px;}
.btn-call{background:var(--green);color:#0a1a08;grid-column:1/-1;flex-direction:row;justify-content:center;gap:10px;font-size:14px;padding:16px;border:1px solid var(--green2);}
.btn-call:active{background:#3a6a30;}
.btn-sec{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.btn-sec:active{background:var(--surface3);}
.btn-next{background:var(--surface3);color:var(--accent2);border:1px solid var(--accent);grid-column:1/-1;flex-direction:row;justify-content:center;gap:8px;font-size:13px;padding:14px;}

/* NOTE SCREEN */
#screen-note{background:var(--bg);}
.note-body{flex:1;display:flex;flex-direction:column;padding:12px 16px 16px;gap:10px;}
.note-ta{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;font-size:14px;color:var(--text);resize:none;outline:none;font-family:'Courier New',monospace;line-height:1.7;min-height:180px;}
.note-ta:focus{border-color:var(--accent);}
.voice-btn{padding:16px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;letter-spacing:1px;text-transform:uppercase;}
.voice-btn.on{background:rgba(138,154,74,.15);border-color:var(--accent);color:var(--accent2);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.save-btn{padding:16px;border-radius:var(--radius);background:var(--accent);border:1px solid var(--accent2);color:#0c0d08;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:2px;text-transform:uppercase;}

/* OFFER SCREEN */
#screen-offer{background:var(--bg);}
.offer-scroll{flex:1;overflow-y:auto;padding:8px 16px;scrollbar-width:none;}
.offer-scroll::-webkit-scrollbar{display:none;}
.ocard{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer;transition:all .1s;}
.ocard:active{transform:scale(.98);}
.ocard.sel{border-color:var(--accent);border-left-color:var(--accent2);background:var(--surface2);}
.otitle{font-size:13px;font-weight:700;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;}
.odesc{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5;letter-spacing:.3px;}
.oprice{font-size:18px;font-weight:700;color:var(--accent3);margin-top:8px;letter-spacing:1px;}
.otag{display:inline-block;padding:2px 7px;border-radius:var(--radius);background:var(--surface3);border:1px solid var(--border2);font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:1px;text-transform:uppercase;font-family:inherit;}
.send-btn{margin:0 16px 16px;padding:16px;border-radius:var(--radius);background:var(--accent);border:1px solid var(--accent2);color:#0c0d08;font-size:13px;font-weight:700;cursor:pointer;width:calc(100%-32px);font-family:inherit;letter-spacing:2px;text-transform:uppercase;flex-shrink:0;}
.send-btn:disabled{opacity:.3;cursor:default;}

/* SETTINGS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius2) var(--radius2) 0 0;padding:20px 16px 36px;width:100%;transform:translateY(100%);transition:transform .25s;}
.modal-bg.open .modal{transform:translateY(0);}
.modal-title{font-size:13px;font-weight:700;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.mlbl{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.minput{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:11px 12px;font-size:13px;color:var(--text);outline:none;margin-bottom:10px;font-family:'Courier New',monospace;}
.minput:focus{border-color:var(--accent);}
.msave{width:100%;padding:14px;border-radius:var(--radius);background:var(--accent);border:1px solid var(--accent2);color:#0c0d08;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:2px;text-transform:uppercase;}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0;transition:all .25s;z-index:100;white-space:nowrap;pointer-events:none;font-family:inherit;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--accent);color:var(--accent2);}
.toast.err{border-color:var(--red);color:#e74c3c;}
</style>
</head>
<body>

<!-- LIST -->
<div id="screen-list" class="screen">
  <div class="list-top">
    <div class="brand">// field ops terminal</div>
    <h1>RepRunner</h1>
    <div class="blade-sub" id="list-sub">inicjalizacja...</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <div class="prog-label" id="prog-lbl"></div>
  </div>
  <div class="filters">
    <div class="chip on" onclick="setFilter('all',this)">Wszystkie</div>
    <div class="chip" onclick="setFilter('open',this)">Open</div>
    <div class="chip" onclick="setFilter('nonote',this)">Bez notatki</div>
    <div class="chip" onclick="setFilter('offer',this)">Oferta</div>
    <div class="chip" onclick="setFilter('warn',this)">Uwaga</div>
  </div>
  <div class="lead-list" id="lead-list"></div>
  <button class="fab" onclick="openCfg()">⚙</button>
</div>

<!-- DETAIL -->
<div id="screen-detail" class="screen hidden">
  <div class="hdr">
    <button class="hdr-back" onclick="goBack()">←</button>
    <div>
      <div class="hdr-title" id="d-title"></div>
      <div class="hdr-sub" id="d-sub"></div>
    </div>
  </div>
  <div class="det-scroll">
    <div class="det-hero">
      <div class="det-ava" id="d-ava"></div>
      <div class="det-name" id="d-name"></div>
      <div class="det-firma" id="d-firma"></div>
      <div class="det-tags" id="d-tags"></div>
    </div>
    <div class="info-block">
      <div class="irow"><span class="ilabel">Miasto</span><span class="ival" id="d-miasto"></span></div>
      <div class="irow"><span class="ilabel">Email</span><span class="ival em" id="d-email"></span></div>
      <div class="irow"><span class="ilabel">Oferta</span><span class="ival" id="d-oferta"></span></div>
    </div>
    <div class="note-block">
      <div class="note-lbl">// notatka</div>
      <div class="note-val" id="d-note"></div>
    </div>
    <div class="actions">
      <button class="btn btn-call" onclick="callLead()">
        <span class="btn-icon">📞</span><span id="call-num">Zadzwoń</span>
      </button>
      <button class="btn btn-sec" onclick="openNote()">
        <span class="btn-icon">🎙</span><span>Notatka</span>
      </button>
      <button class="btn btn-sec" onclick="openOffer()">
        <span class="btn-icon">📩</span><span>Oferta</span>
      </button>
      <button class="btn btn-sec" onclick="doReminder()">
        <span class="btn-icon">⏰</span><span>Przypomnij</span>
      </button>
      <button class="btn btn-next" onclick="nextLead()">
        <span>Następny</span><span>→</span>
      </button>
    </div>
  </div>
</div>

<!-- NOTE -->
<div id="screen-note" class="screen hidden">
  <div class="hdr">
    <button class="hdr-back" onclick="closeNote()">←</button>
    <div>
      <div class="hdr-title">// notatka głosowa</div>
      <div class="hdr-sub" id="note-for"></div>
    </div>
  </div>
  <div class="note-body">
    <textarea class="note-ta" id="note-ta" placeholder="Wpisz lub podyktuj..."></textarea>
    <button class="voice-btn" id="vbtn" onclick="toggleVoice()">
      <span id="vicon">🎙</span><span id="vlbl">Naciśnij i mów</span>
    </button>
    <button class="save-btn" onclick="saveNote()">Zapisz notatkę</button>
  </div>
</div>

<!-- OFFER -->
<div id="screen-offer" class="screen hidden">
  <div class="hdr">
    <button class="hdr-back" onclick="closeOffer()">←</button>
    <div>
      <div class="hdr-title">// wybierz ofertę</div>
      <div class="hdr-sub" id="offer-for"></div>
    </div>
  </div>
  <div class="offer-scroll" id="offer-list"></div>
  <button class="send-btn" id="send-btn" onclick="sendOffer()" disabled>Wyślij ofertę</button>
</div>

<!-- SETTINGS -->
<div class="modal-bg" id="cfg-modal" onclick="closeCfg(event)">
  <div class="modal">
    <div class="modal-title">// konfiguracja n8n</div>
    <div class="mlbl">Webhook — notatka</div>
    <input class="minput" id="c-note" type="url" placeholder="https://n8n.../webhook/note">
    <div class="mlbl">Webhook — oferta</div>
    <input class="minput" id="c-offer" type="url" placeholder="https://n8n.../webhook/offer">
    <div class="mlbl">Webhook — przypomnienie</div>
    <input class="minput" id="c-rem" type="url" placeholder="https://n8n.../webhook/reminder">
    <div class="mlbl">Twój email</div>
    <input class="minput" id="c-email" type="email" placeholder="krystian@vertextrading.eu">
    <button class="msave" onclick="saveCfg()">Zapisz</button>
  </div>
</div>

<div class="toast" id="toast"></div>

const WARN_STATUSES = ['nie odbiera','error','za drogo'];

let leads = LEADS.map(l => ({...l}));
let curIdx = 0;
let curFilter = 'all';
let selOffer = null;
let rec = null;
let isRec = false;
let cfg = {nw:'',ow:'',rw:'',em:''};

try { const s = localStorage.getItem('rr_cfg'); if(s) cfg = {...cfg,...JSON.parse(s)}; } catch(e){}

function loadNotes() {
  try {
    const s = localStorage.getItem('rr_notes');
    if(!s) return;
    const n = JSON.parse(s);
    leads.forEach(l => { if(n[l.idx] !== undefined) l.notatka = n[l.idx]; });
  } catch(e){}
}
function saveNoteLocal(idx, text) {
  try {
    const s = localStorage.getItem('rr_notes');
    const n = s ? JSON.parse(s) : {};
    n[idx] = text;
    localStorage.setItem('rr_notes', JSON.stringify(n));
  } catch(e){}
}
loadNotes();

function filtered() {
  if(curFilter === 'open') return leads.filter(l => l.status === 'Open');
  if(curFilter === 'nonote') return leads.filter(l => !l.notatka);
  if(curFilter === 'offer') return leads.filter(l => l.oferta_status && l.oferta_status.toLowerCase().includes('sent'));
  if(curFilter === 'warn') return leads.filter(l => WARN_STATUSES.some(w => l.status.toLowerCase().includes(w)));
  return leads;
}

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  renderList();
}

function getBadge(l) {
  if(l.notatka) return {cls:'b-note', txt:'✓ nota'};
  if(WARN_STATUSES.some(w => l.status.toLowerCase().includes(w))) return {cls:'b-warn', txt:'uwaga'};
  if(l.oferta_status && l.oferta_status.toLowerCase().includes('sent')) return {cls:'b-offer', txt:'oferta'};
  return {cls:'b-open', txt:'open'};
}

function renderList() {
  const fl = filtered();
  const done = leads.filter(l => l.notatka).length;
  document.getElementById('list-sub').textContent = `${fl.length} targets · ${done} z notatką`;
  document.getElementById('prog').style.width = Math.round(done/leads.length*100)+'%';
  document.getElementById('prog-lbl').textContent = `>> ${done} / ${leads.length} obrobionych`;

  document.getElementById('lead-list').innerHTML = fl.map(l => {
    const b = getBadge(l);
    const meta = [l.firma, l.miasto].filter(Boolean).join(' · ') || l.status || '—';
    return `<div class="lcard ${l.notatka?'has-note':''}" onclick="openLead(${leads.indexOf(l)})">
      <div class="ava">${l.imie[0].toUpperCase()}</div>
      <div class="linfo">
        <div class="lname">${l.imie}${l.firma?' — '+l.firma:''}</div>
        <div class="lmeta">${meta}</div>
      </div>
      <div class="badge ${b.cls}">${b.txt}</div>
    </div>`;
  }).join('');
}

function openLead(i) {
  curIdx = i;

}

function showDetail() {
  const l = leads[curIdx];
  const fl = filtered();
  const pos = fl.indexOf(l);
  document.getElementById('d-title').textContent = l.imie.toUpperCase() + ' · #' + l.idx;
  document.getElementById('d-sub').textContent = `target ${pos+1} of ${fl.length}`;
  document.getElementById('d-ava').textContent = l.imie[0].toUpperCase();
  document.getElementById('d-name').textContent = l.imie;
  document.getElementById('d-firma').textContent = l.firma || '—';
  document.getElementById('d-miasto').textContent = l.miasto || '—';
  document.getElementById('d-email').textContent = l.email || '—';
  document.getElementById('d-oferta').textContent = l.oferta_status || '—';
  document.getElementById('d-note').innerHTML = l.notatka
    ? `<span>${l.notatka}</span>`
    : `<span class="note-empty">// brak notatki</span>`;
  document.getElementById('call-num').textContent = l.phone;
  const tags = [l.status, l.kiedy].filter(Boolean);
  document.getElementById('d-tags').innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');
  showScreen('screen-detail','screen-list');
}

function callLead() {
  const p = leads[curIdx].phone.replace(/\s/g,'');
  window.location.href = 'tel:'+p;
}

function nextLead() {
  const fl = filtered();
  const pos = fl.indexOf(leads[curIdx]);
  if(pos < fl.length-1) {
    curIdx = leads.indexOf(fl[pos+1]);
    showDetail();
  } else {
    toast('>> koniec listy', 'ok');
  }
}

function goBack() {
  showScreen('screen-list','screen-detail',true);
  renderList();

// NOTE
function openNote() {
  const l = leads[curIdx];
  document.getElementById('note-for').textContent = l.imie + (l.firma ? ' · '+l.firma : '');
  document.getElementById('note-ta').value = l.notatka || '';
  showScreen('screen-note','screen-detail');
}
function closeNote() { stopVoice(); showScreen('screen-detail','screen-note',true); }

function toggleVoice() {
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    toast('>> brak API mowy w tej przeglądarce','err'); return;
  }
  isRec ? stopVoice() : startVoice();
}

function startVoice() {
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  rec = new SR();
  rec.lang = 'pl-PL';
  rec.continuous = true;
  rec.interimResults = true;

  // FIX: capture baseline text once, never re-read from textarea during session
  const baseline = document.getElementById('note-ta').value.trim();
  let final = baseline;

  rec.onresult = e => {
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript.trim();
      if(e.results[i].isFinal) final += (final?' ':'')+t;
      else interim = t;
    }
    // show interim as preview only, never mixed into final
    document.getElementById('note-ta').value = final + (interim ? '\n[…] '+interim : '');
  };

  rec.onend = () => {
    // clean up interim marker on stop
    const ta = document.getElementById('note-ta');
    ta.value = ta.value.replace(/\n\[…\].*$/,'');
    isRec = false; updateVUI();
  };
  rec.onerror = () => { isRec = false; updateVUI(); };
  rec.start();
  isRec = true; updateVUI();
}

function stopVoice() {
  if(rec) rec.stop();
  isRec = false; updateVUI();
}

function updateVUI() {
  document.getElementById('vicon').textContent = isRec ? '⏹' : '🎙';
  document.getElementById('vlbl').textContent = isRec ? 'Nagrywam — naciśnij by zatrzymać' : 'Naciśnij i mów';
  document.getElementById('vbtn').classList.toggle('on', isRec);
}

async function saveNote() {
  stopVoice();
  const text = document.getElementById('note-ta').value.replace(/\n\[…\].*$/,'').trim();
  if(!text){ toast('>> notatka pusta','err'); return; }
  const l = leads[curIdx];
  l.notatka = text;
  saveNoteLocal(l.idx, text);
  if(cfg.nw) {
    try {
      await fetch(cfg.nw,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({idx:l.idx,imie:l.imie,firma:l.firma,phone:l.phone,email:l.email,notatka:text,ts:new Date().toISOString()})});
      toast('>> notatka → google sheet','ok');
    } catch(e){ toast('>> zapisano lokalnie','ok'); }
  } else { toast('>> zapisano lokalnie','ok'); }
  closeNote();
  showDetail();
}

// OFFER
function openOffer() {
  const l = leads[curIdx];
  document.getElementById('offer-for').textContent = '→ '+l.imie+' · '+l.email;
  selOffer = null;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  document.getElementById('offer-list').innerHTML = OFFERS.map(o =>
    `<div class="ocard" id="oc-${o.id}" onclick="selOfferFn('${o.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div class="otitle">${o.title}</div>
        <span class="otag">${o.tag}</span>
      </div>
      <div class="odesc">${o.desc}</div>
      <div class="oprice">${o.price}</div>
    </div>`
  ).join('');
  showScreen('screen-offer','screen-detail');
}

function selOfferFn(id) {
  selOffer = OFFERS.find(o => o.id===id);
  document.querySelectorAll('.ocard').forEach(c => c.classList.remove('sel'));
  document.getElementById('oc-'+id).classList.add('sel');
  document.getElementById('send-btn').disabled = false;
}

function closeOffer() { showScreen('screen-detail','screen-offer',true); }

async function sendOffer() {
  if(!selOffer) return;
  const l = leads[curIdx];
  if(cfg.ow) {
    try {
      await fetch(cfg.ow,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({idx:l.idx,imie:l.imie,firma:l.firma,email:l.email,
          offer_id:selOffer.id,offer_title:selOffer.title,sender:cfg.em,ts:new Date().toISOString()})});
      l.oferta_status = 'sent '+new Date().toLocaleDateString('pl');
      toast('>> oferta wysłana','ok');
    } catch(e){ toast('>> brak połączenia n8n','err'); }
  } else { toast('>> skonfiguruj webhook oferty','err'); }
  closeOffer(); showDetail();
}

// REMINDER
function doReminder() {
  const l = leads[curIdx];
  const t = prompt(`Kiedy zadzwonić do ${l.imie}?\n(np. jutro 10:00)`);
  if(!t) return;
  if(cfg.rw) {
    fetch(cfg.rw,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({idx:l.idx,imie:l.imie,phone:l.phone,reminder:t,ts:new Date().toISOString()})})
      .then(()=>toast('>> reminder ustawiony','ok'))
      .catch(()=>toast('>> brak połączenia n8n','err'));
  } else { toast('>> '+t,'ok'); }
}

// SCREENS
function showScreen(showId, hideId, back) {
  const s = document.getElementById(showId);
  const h = document.getElementById(hideId);
  if(back){ h.classList.add('hidden'); s.classList.remove('hidden','slide-left'); }
  else { h.classList.add('slide-left'); s.classList.remove('hidden'); }
}

// CONFIG
function openCfg() {
  document.getElementById('c-note').value = cfg.nw;
  document.getElementById('c-offer').value = cfg.ow;
  document.getElementById('c-rem').value = cfg.rw;
  document.getElementById('c-email').value = cfg.em;
  document.getElementById('cfg-modal').classList.add('open');
}
function closeCfg(e) { if(e.target===document.getElementById('cfg-modal')) document.getElementById('cfg-modal').classList.remove('open'); }
function saveCfg() {
  cfg = {nw:document.getElementById('c-note').value.trim(),
         ow:document.getElementById('c-offer').value.trim(),
         rw:document.getElementById('c-rem').value.trim(),
         em:document.getElementById('c-email').value.trim()};
  try { localStorage.setItem('rr_cfg',JSON.stringify(cfg)); } catch(e){}
  document.getElementById('cfg-modal').classList.remove('open');
  toast('>> config saved','ok');
}

// TOAST
let toastT;
function toast(msg, type) {
  clearTimeout(toastT);
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show '+(type||'');
  toastT = setTimeout(()=>t.classList.remove('show'),2800);
}

renderList();
