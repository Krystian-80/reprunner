<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RepRunner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#f0f0f0;font-family:system-ui,sans-serif;}
.top{padding:48px 20px 12px;}
.label{font-size:11px;font-weight:600;color:#606060;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
h1{font-size:32px;font-weight:700;}
.sub{font-size:14px;color:#606060;margin-top:4px;}
.prog-wrap{padding:10px 20px 0;}
.prog-track{height:2px;background:#1e1e1e;}
.prog-bar{height:100%;background:#4a9eff;transition:width .4s;width:0%;}
.prog-txt{font-size:12px;color:#606060;margin-top:4px;}
.filters{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;background:#141414;border:1px solid #2a2a2a;font-size:13px;color:#606060;cursor:pointer;}
.chip.on{background:#fff;color:#000;border-color:#fff;}
.list{padding:8px 20px 100px;overflow-y:auto;height:calc(100vh - 175px);scrollbar-width:none;}
.card{background:#141414;border:1px solid #2a2a2a;border-left:3px solid #2a2a2a;border-radius:8px;padding:16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.card:active{background:#1e1e1e;}
.card.has-note{border-left-color:#2ecc71;}
.card.is-hot{border-left-color:#e74c3c;}
.ava{width:46px;height:46px;border-radius:8px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;}
.linfo{flex:1;min-width:0;}
.lname{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lmeta{font-size:13px;color:#606060;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;flex-shrink:0;}
.b-open{background:#1e1e1e;color:#606060;}
.b-note{background:rgba(46,204,113,.15);color:#2ecc71;}
.b-hot{background:rgba(231,76,60,.15);color:#e74c3c;}
.fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:#1e1e1e;border:1px solid #2a2a2a;color:#a0a0a0;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;}
.fab2{position:fixed;bottom:24px;right:82px;width:52px;height:52px;border-radius:50%;background:#1e1e1e;border:1px solid #2ecc71;color:#2ecc71;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;}
/* DETAIL */
.screen{position:fixed;inset:0;background:#0a0a0a;overflow-y:auto;display:none;scrollbar-width:none;}
.screen.show{display:block;}
.hdr{padding:48px 20px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1e1e1e;position:sticky;top:0;background:#0a0a0a;z-index:10;}
.back{width:48px;height:48px;border-radius:10px;background:#1e1e1e;border:1px solid #383838;color:#f0f0f0;font-size:22px;font-weight:700;cursor:pointer;}
.htitle{font-size:17px;font-weight:600;}
.hsub{font-size:13px;color:#606060;margin-top:2px;}
.hero{padding:20px;}
.big-ava{width:60px;height:60px;border-radius:12px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin-bottom:14px;}
.big-name{font-size:26px;font-weight:700;}
.firma-txt{font-size:14px;color:#606060;margin-top:4px;}
.iblock{margin:0 20px 14px;border:1px solid #1e1e1e;border-radius:8px;overflow:hidden;}
.irow{background:#141414;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e1e1e;}
.irow:last-child{border-bottom:none;}
.ilbl{font-size:13px;color:#606060;}
.ival{font-size:14px;font-weight:600;text-align:right;max-width:60%;word-break:break-all;}
.blue{color:#4a9eff;}
.nbox{margin:0 20px 14px;background:#141414;border:1px solid #1e1e1e;border-radius:8px;padding:14px;}
.nlbl{font-size:11px;font-weight:600;color:#606060;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.nval{font-size:15px;line-height:1.6;}
.nempty{font-size:14px;color:#606060;font-style:italic;}
.acts{padding:0 20px 30px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{border:none;border-radius:8px;padding:18px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;}
.btn:active{transform:scale(.97);}
.bico{font-size:22px;}
.bcall{background:#27ae60;color:#fff;grid-column:1/-1;flex-direction:row;justify-content:center;gap:12px;font-size:16px;padding:20px;border-radius:10px;}
.bgray{background:#1e1e1e;color:#f0f0f0;border:1px solid #2a2a2a;}
.bnext{background:#1e1e1e;color:#f0f0f0;border:1px solid #2a2a2a;grid-column:1/-1;flex-direction:row;justify-content:center;gap:8px;font-size:15px;padding:18px;border-radius:10px;}
/* NOTE */
.note-screen{position:fixed;inset:0;background:#0a0a0a;display:none;flex-direction:column;}
.note-screen.show{display:flex;}
.note-body{flex:1;display:flex;flex-direction:column;padding:16px 20px 20px;gap:12px;}
textarea{flex:1;background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:16px;font-size:16px;color:#f0f0f0;resize:none;outline:none;font-family:inherit;line-height:1.7;min-height:150px;}
textarea:focus{border-color:#4a9eff;}
.vbtn{padding:18px;border-radius:8px;background:#1e1e1e;border:1px solid #2a2a2a;color:#f0f0f0;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.vbtn.rec{background:rgba(231,76,60,.12);border-color:#e74c3c;color:#e74c3c;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.sbtn{padding:18px;border-radius:8px;background:#4a9eff;color:#fff;font-size:16px;font-weight:600;cursor:pointer;border:none;}
/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;opacity:0;transition:all .22s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:#2ecc71;color:#2ecc71;}
.toast.err{border-color:#e74c3c;color:#e74c3c;}
.toast.info{border-color:#4a9eff;color:#4a9eff;}
</style>
</head>

</div>

<div class="note-screen" id="noteScr">
  <div class="hdr">
    <button class="back" onclick="closeNote()">&#8592;</button>

  <div class="note-body">

    </button>
    <button class="sbtn" onclick="saveNote()">&#128190; Zapisz notatke</button>

</div>

var leads = LEADS.map(function(l){ return Object.assign({}, l); });
var curIdx = 0;
var curFilter = "all";
var rec = null;
var isRec = false;

function loadNotes() {
  try {
    var s = localStorage.getItem("rr2_notes");
    if (!s) return;
    var n = JSON.parse(s);
    leads.forEach(function(l) { if (n[l.idx]) l.notatka = n[l.idx]; });
  } catch(e) { localStorage.removeItem("rr2_notes"); }
}
function saveNoteLocal(idx, text) {
  try {
    var s = localStorage.getItem("rr2_notes");
    var n = s ? JSON.parse(s) : {};
    n[idx] = text;
    localStorage.setItem("rr2_notes", JSON.stringify(n));
  } catch(e) {}
}
loadNotes();

function isHot(l) { return l.timeframe && (l.timeframe.indexOf("najszybciej") >= 0 || l.timeframe.indexOf("1-3") >= 0); }

function filtered() {
  if (curFilter === "open") return leads.filter(function(l){ return true; });
  if (curFilter === "nonote") return leads.filter(function(l){ return !l.notatka; });
  if (curFilter === "hot") return leads.filter(function(l){ return isHot(l); });
  return leads;
}

function setF(f, el) {
  curFilter = f;
  document.querySelectorAll(".chip").forEach(function(c){ c.classList.remove("on"); });
  el.classList.add("on");
  renderList();
}

function renderList() {
  var fl = filtered();
  var done = leads.filter(function(l){ return l.notatka; }).length;
  document.getElementById("sub").textContent = fl.length + " leadow - " + done + " z notatka";
  document.getElementById("prog").style.width = Math.round(done / leads.length * 100) + "%";
  document.getElementById("progtxt").textContent = done + " / " + leads.length + " obrobionych";
  var html = "";
  for (var i = 0; i < fl.length; i++) {
    var l = fl[i];
    var ri = leads.indexOf(l);
    var hot = isHot(l);
    var bc = l.notatka ? "b-note" : hot ? "b-hot" : "b-open";
    var bt = l.notatka ? "Notatka" : hot ? "Pilne" : "Open";
    var cls = "card" + (l.notatka ? " has-note" : "") + (hot && !l.notatka ? " is-hot" : "");
    var meta = [l.firma, l.miasto].filter(function(x){ return x; }).join(" - ") || l.timeframe || "-";
    html += "<div class='" + cls + "' onclick='openLead(" + ri + ")'>";
    html += "<div class='ava'>" + l.imie[0].toUpperCase() + "</div>";
    html += "<div class='linfo'><div class='lname'>" + l.imie + (l.firma ? " - " + l.firma : "") + "</div>";
    html += "<div class='lmeta'>" + meta + "</div></div>";
    html += "<div class='badge " + bc + "'>" + bt + "</div></div>";
  }
  document.getElementById("list").innerHTML = html;
}

function openLead(i) { curIdx = i; showDet(); }

function showDet() {
  var l = leads[curIdx];
  var fl = filtered();
  var pos = fl.indexOf(l);
  document.getElementById("d-title").textContent = l.imie + " #" + l.idx;
  document.getElementById("d-sub").textContent = "Lead " + (pos + 1) + " z " + fl.length;
  document.getElementById("d-ava").textContent = l.imie[0].toUpperCase();
  document.getElementById("d-name").textContent = l.imie;
  document.getElementById("d-firma").textContent = l.firma || "";
  document.getElementById("d-miasto").textContent = l.miasto || "-";
  document.getElementById("d-obj").textContent = l.objective || "-";
  document.getElementById("d-time").textContent = l.timeframe || "-";
  document.getElementById("d-email").textContent = l.email || "-";
  document.getElementById("d-oferta").textContent = l.oferta_status || "-";
  document.getElementById("d-phone").textContent = l.phone;
  var noteEl = document.getElementById("d-note");
  if (l.notatka) {
    noteEl.innerHTML = "<span class='nval'>" + l.notatka + "</span>";
  } else {
    noteEl.innerHTML = "<span class='nempty'>Brak notatki - nagraj po rozmowie</span>";
  }
  document.getElementById("det").classList.add("show");
}

function goBack() { document.getElementById("det").classList.remove("show"); renderList(); }
function doCall() { window.location.href = "tel:" + leads[curIdx].phone.replace(/\s/g, ""); }

function nextLead() {
  var fl = filtered();
  var pos = fl.indexOf(leads[curIdx]);
  if (pos < fl.length - 1) { curIdx = leads.indexOf(fl[pos + 1]); showDet(); }
  else { toast("Koniec listy!", "ok"); }
}

function openNote() {
  var l = leads[curIdx];
  document.getElementById("note-for").textContent = l.imie + (l.firma ? " - " + l.firma : "");
  document.getElementById("ta").value = l.notatka || "";
  document.getElementById("noteScr").classList.add("show");
}
function closeNote() { stopVoice(); document.getElementById("noteScr").classList.remove("show"); }

function toggleVoice() {
  if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) {
    toast("Brak API mowy - wpisz recznie", "err"); return;
  }
  if (isRec) { stopVoice(); } else { startVoice(); }
}

function startVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  rec = new SR();
  rec.lang = "pl-PL";
  rec.continuous = false;  // KEY FIX: false stops Android from duplicating
  rec.interimResults = false; // KEY FIX: no interim = no duplicates
  var existing = document.getElementById("ta").value.trim();

  rec.onresult = function(e) {
    var newText = "";
    for (var i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        newText += (newText ? " " : "") + e.results[i][0].transcript.trim();
      }
    }
    var combined = existing ? existing + " " + newText : newText;
    document.getElementById("ta").value = combined;
    existing = combined; // update base for next rec session
    // Auto-restart for continuous feel
    if (isRec) {
      setTimeout(function() {
        if (isRec) {
          try { rec.start(); } catch(e2) {}
        }
      }, 100);
    }
  };

  rec.onend = function() {
    if (!isRec) { updateVUI(); }
  };
  rec.onerror = function(e) {
    if (e.error !== "aborted") { isRec = false; updateVUI(); }
  };
  try { rec.start(); } catch(e) {}
  isRec = true; updateVUI();
}

function stopVoice() { if (rec) rec.stop(); isRec = false; updateVUI(); }

function updateVUI() {
  document.getElementById("vico").textContent = isRec ? "Stop" : "Mikrofon";
  document.getElementById("vlbl").textContent = isRec ? "Nagrywam - nacisnij by zatrzymac" : "Nacisnij i mow";
  document.getElementById("vbtn").classList.toggle("rec", isRec);
}

function saveNote() {
  stopVoice();
  var text = document.getElementById("ta").value.replace(/\s*\.\.\..*/g, "").trim();
  if (!text) { toast("Notatka pusta", "err"); return; }
  leads[curIdx].notatka = text;
  saveNoteLocal(leads[curIdx].idx, text);
  toast("Zapisano!", "ok");
  closeNote();
  showDet();
}

function doReminder() {
  var l = leads[curIdx];
  var d = new Date();
  d.setDate(d.getDate() + 1);
  d.setHours(9, 0, 0, 0);
  var end = new Date(d.getTime() + 30 * 60000);
  function fmt(dt) { return dt.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z"; }
  var title = encodeURIComponent("Oddzwon: " + l.imie + (l.firma ? " - " + l.firma : ""));
  var det = encodeURIComponent("Tel: " + l.phone + "\nEmail: " + l.email);
  window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text=" + title + "&dates=" + fmt(d) + "/" + fmt(end) + "&details=" + det, "_blank");
  toast("Otwieram Kalendarz", "info");
}

function exportXLS() {
  // Build data array
  var rows = [["Imie","Firma","Telefon","Email","Miasto","Co czyscic","Kiedy kupuje","Notatka"]];
  leads.forEach(function(l) {
    rows.push([
      l.imie, l.firma||"", l.phone, l.email,
      l.miasto||"", l.objective||"", l.timeframe||"", l.notatka||""
    ]);
  });

  // Create XLS using data URIs (works without SheetJS)
  var xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" ';
  xml += 'xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';
  xml += '<Worksheet ss:Name="RepRunner"><Table>\n';
  rows.forEach(function(row, ri) {
    xml += '<Row>';
    row.forEach(function(cell) {
      var safe = String(cell||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      var type = ri === 0 ? 'String' : 'String';
      xml += '<Cell><Data ss:Type="' + type + '">' + safe + '</Data></Cell>';
    });
    xml += '</Row>\n';
  });
  xml += '</Table></Worksheet></Workbook>';

  var blob = new Blob([xml], {type: "application/vnd.ms-excel;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "reprunner-" + new Date().toISOString().slice(0,10) + ".xls";
  a.click();
  toast("XLS pobrany - " + leads.length + " leadow", "ok");
}

var toastT;
function toast(msg, type) {
  clearTimeout(toastT);
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type || "");
  toastT = setTimeout(function() { t.classList.remove("show"); }, 2800);
}

renderList();
